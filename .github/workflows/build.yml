      - name: Check bridge startup failure
        run: |
          python3 - <<'PY'
          import contextlib
          import io
          import sys
          from pathlib import Path

          import demo.bridge as bridge

          old_argv = sys.argv[:]
          old_session = bridge.LlmosSession

          def fail_session(*args, **kwargs):
              raise EOFError("llmos exited before completing a line")

          try:
              bridge.LlmosSession = fail_session
              sys.argv = ["bridge.py", "--image", "build/llmos.img", "repl"]
              stderr = io.StringIO()
              with contextlib.redirect_stderr(stderr):
                  rc = bridge.main()
              if rc != 2:
                  raise SystemExit(f"unexpected return code: {rc}")
              if "failed to start llmos" not in stderr.getvalue():
                  raise SystemExit(f"unexpected stderr: {stderr.getvalue()!r}")
          finally:
              sys.argv = old_argv
              bridge.LlmosSession = old_session

          fake_qemu = Path("/tmp/llmos-fake-qemu-stderr")
          fake_qemu.write_text("#!/bin/sh\necho qemu exploded >&2\nexit 1\n", encoding="utf-8")
          fake_qemu.chmod(0o755)
          try:
              bridge.LlmosSession(Path("build/llmos.img"), qemu=str(fake_qemu), boot_timeout=1.0)
          except RuntimeError as exc:
              if "qemu stderr: qemu exploded" not in str(exc):
                  raise SystemExit(f"qemu stderr was not surfaced: {exc!r}")
          else:
              raise SystemExit("expected fake QEMU startup to fail")
          PY

