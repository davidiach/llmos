name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm qemu-system-x86

      - name: Build and run local CI checks
        run: make ci-check

      - name: Report sizes
        run: |
          echo "boot.bin:   $(wc -c < build/boot.bin) bytes"
          echo "kernel.bin: $(wc -c < build/kernel.bin) bytes"
          echo "llmos.img:  $(wc -c < build/llmos.img) bytes"

      - name: Check bridge boot-timeout cleanup
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          import time
          from pathlib import Path

          from demo.bridge import LlmosSession

          marker = f"llmos-boot-timeout-probe-{os.getpid()}"
          try:
              LlmosSession(
                  Path("build/llmos.img"),
                  qemu_args=["-S", "-name", marker],
                  boot_timeout=0.2,
              )
          except TimeoutError:
              pass
          else:
              raise SystemExit("expected boot banner timeout")

          time.sleep(0.2)
          probe = subprocess.run(
              ["pgrep", "-f", marker],
              stdout=subprocess.PIPE,
              text=True,
              check=False,
          )
          if probe.stdout.strip():
              raise SystemExit(f"qemu process leaked: {probe.stdout.strip()}")
          PY

      - name: Check bridge boot-timeout precision
        run: |
          python3 - <<'PY'
          from demo.bridge import LlmosSession

          session = object.__new__(LlmosSession)
          timeouts = []

          def fake_readline(timeout):
              timeouts.append(timeout)
              raise TimeoutError("synthetic banner timeout")

          session._readline = fake_readline
          try:
              session._await_banner(0.01)
          except TimeoutError:
              pass
          else:
              raise SystemExit("expected synthetic banner timeout")

          if not timeouts:
              raise SystemExit("_await_banner did not attempt to read")
          if timeouts[0] > 0.05:
              raise SystemExit(f"boot timeout was inflated: {timeouts[0]}")
          PY

      - name: Check bridge forced-close wait
        run: |
          python3 - <<'PY'
          import subprocess

          from demo.bridge import LlmosSession

          class FakeProc:
              def __init__(self, reap_after_kill):
                  self.terminated = False
                  self.killed = False
                  self.wait_calls = 0
                  self.reap_after_kill = reap_after_kill

              def poll(self):
                  return None

              def terminate(self):
                  self.terminated = True

              def kill(self):
                  self.killed = True

              def wait(self, timeout=None):
                  self.wait_calls += 1
                  if self.wait_calls == 1 or not self.reap_after_kill:
                      raise subprocess.TimeoutExpired("stubborn-qemu", timeout)
                  return -9

          def check(reap_after_kill):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(reap_after_kill)
              session.close()
              if not session.proc.terminated:
                  raise SystemExit("close did not try terminate")
              if not session.proc.killed:
                  raise SystemExit("close did not kill after terminate timeout")
              if session.proc.wait_calls != 2:
                  raise SystemExit(f"expected wait after kill, got {session.proc.wait_calls}")

          check(True)
          check(False)
          PY

      - name: Check bridge broken-pipe send
        run: |
          python3 - <<'PY'
          from demo.bridge import LlmosSession

          class FailingStdin:
              def __init__(self, fail_on):
                  self.fail_on = fail_on
                  self.writes = []

              def write(self, payload):
                  self.writes.append(payload)
                  if self.fail_on == "write":
                      raise BrokenPipeError("stdin is closed")

              def flush(self):
                  if self.fail_on == "flush":
                      raise BrokenPipeError("stdin is closed")

          class FakeProc:
              def __init__(self, fail_on):
                  self.stdin = FailingStdin(fail_on)

          def check(fail_on):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(fail_on)
              session._sync_lost = False
              session.log = []
              session._readline = lambda timeout=2.0: (_ for _ in ()).throw(
                  SystemExit("send tried to read after stdin failed")
              )

              try:
                  session.send("help")
              except EOFError as exc:
                  if "stdin closed" not in str(exc):
                      raise SystemExit(f"unexpected EOF detail: {exc}")
              else:
                  raise SystemExit("expected EOFError from broken stdin")

              if not session._sync_lost:
                  raise SystemExit("broken stdin did not desynchronize session")
              try:
                  session.send("help")
              except RuntimeError:
                  pass
              else:
                  raise SystemExit("desynchronized session accepted another send")

          check("write")
          check("flush")
          PY

      - name: Check bridge stdout pump failures
        run: |
          python3 - <<'PY'
          import queue

          from demo.bridge import LlmosSession

          class FailingStdout:
              def __init__(self, chunks):
                  self.chunks = list(chunks)

              def read(self, size):
                  if self.chunks:
                      return self.chunks.pop(0)
                  raise OSError("stdout pipe failed")

          class FakeProc:
              def __init__(self, chunks):
                  self.stdout = FailingStdout(chunks)

          def check(chunks):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(chunks)
              session._stdout_queue = queue.Queue()
              session._pump_stdout()
              try:
                  session._readline(timeout=0.01)
              except EOFError as exc:
                  if "partial" not in str(exc):
                      raise SystemExit(f"unexpected EOF detail: {exc}")
              else:
                  raise SystemExit("expected EOFError after stdout pump failure")

          check([])
          check([b"o", b"k"])
          PY

      - name: Check bridge stderr pump buffering
        run: |
          python3 - <<'PY'
          import threading

          from demo.bridge import LlmosSession

          class FakeStderr:
              def __init__(self, chunks, final):
                  self.chunks = list(chunks)
                  self.final = final

              def read(self, size):
                  if self.chunks:
                      return self.chunks.pop(0)
                  if self.final == "eof":
                      return b""
                  raise OSError("stderr pipe failed")

          class FakeProc:
              def __init__(self, chunks, final):
                  self.stderr = FakeStderr(chunks, final)

          def check(chunks, final, limit, expected):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(chunks, final)
              session._stderr_limit = limit
              session._stderr_buf = bytearray()
              session._stderr_lock = threading.Lock()
              session._pump_stderr()
              got = session._stderr_text()
              if got != expected:
                  raise SystemExit(f"stderr buffer was {got!r}, expected {expected!r}")

          check([b"qemu ", b"warning"], "eof", 64, "qemu warning")
          check([b"12345", b"67890"], "error", 8, "34567890")
          PY

      - name: Check bridge single-line sends
        run: |
          python3 - <<'PY'
          import contextlib
          import io
          from pathlib import Path

          from demo.bridge import LlmosSession, mode_ai, mode_script

          class RecordingStdin:
              def __init__(self):
                  self.writes = []
                  self.flushed = False

              def write(self, payload):
                  self.writes.append(payload)

              def flush(self):
                  self.flushed = True

          class FakeProc:
              def __init__(self):
                  self.stdin = RecordingStdin()

          def check_rejected(cmd, detail):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc()
              session._sync_lost = False
              session.log = []
              session._readline = lambda timeout=2.0: (_ for _ in ()).throw(
                  SystemExit("send tried to read after rejecting command")
              )

              try:
                  session.send(cmd)
              except ValueError as exc:
                  if detail not in str(exc):
                      raise SystemExit(f"unexpected ValueError detail: {exc}")
              else:
                  raise SystemExit("expected ValueError for invalid command")

              if session.proc.stdin.writes:
                  raise SystemExit(f"invalid command was written: {session.proc.stdin.writes!r}")
              if session.proc.stdin.flushed:
                  raise SystemExit("invalid command flushed stdin")
              if session._sync_lost:
                  raise SystemExit("local validation failure desynchronized session")

          check_rejected("help\nmem.query", "single line")
          check_rejected("help\rmem.query", "single line")
          check_rejected("help" + chr(0) + " unexpected=1", "printable ASCII")
          check_rejected("help" + chr(0x7F), "printable ASCII")
          check_rejected("help " + chr(0x2603), "ASCII")

          class RejectingSession:
              banner = "# llmos test proto=1"

              def send(self, cmd):
                  raise ValueError("llmos commands must be ASCII")

          script = Path("/tmp/llmos-invalid-command.llmos")
          script.write_text("help " + chr(0x2603) + "\n", encoding="utf-8")
          out = io.StringIO()
          with contextlib.redirect_stdout(out):
              mode_script(RejectingSession(), script)
          script_output = out.getvalue()
          if "# invalid command: llmos commands must be ASCII" not in script_output:
              raise SystemExit(f"script mode did not report validation failure: {script_output!r}")
          if chr(0x2603) in script_output or "\\u2603" not in script_output:
              raise SystemExit(f"script mode did not escape invalid command output: {script_output!r}")

          class EscapedTextBlock:
              type = "text"
              text = "help " + chr(0x1B) + "[31m"

          class EscapedResponse:
              content = [EscapedTextBlock()]

          class EscapedMessages:
              def create(self, **kwargs):
                  return EscapedResponse()

          class EscapedClient:
              messages = EscapedMessages()

          out = io.StringIO()
          with contextlib.redirect_stdout(out):
              mode_ai(RejectingSession(), "task", step_limit=1, client=EscapedClient())
          ai_output = out.getvalue()
          if chr(0x1B) in ai_output or "\\x1b" not in ai_output:
              raise SystemExit(f"AI mode did not escape invalid command output: {ai_output!r}")
          PY

      - name: Check bridge REPL disconnect exit
        run: |
          python3 - <<'PY'
          import builtins
          import contextlib
          import io
          import sys

          import demo.bridge as bridge

          class FakeSession:
              banner = "# llmos test proto=1"

              def __init__(self):
                  self.closed = False

              def send(self, cmd):
                  raise RuntimeError("link lost")

              def close(self):
                  self.closed = True

          old_argv = sys.argv[:]
          old_input = builtins.input
          old_image = bridge.preflight_image_path
          old_qemu = bridge.preflight_qemu
          old_session = bridge.LlmosSession
          fake_session = FakeSession()

          try:
              bridge.preflight_image_path = lambda path: None
              bridge.preflight_qemu = lambda qemu: None
              bridge.LlmosSession = lambda *args, **kwargs: fake_session
              builtins.input = lambda prompt="": "help"
              sys.argv = ["bridge.py", "repl"]
              stderr = io.StringIO()
              with contextlib.redirect_stderr(stderr):
                  rc = bridge.main()
              if rc != 1:
                  raise SystemExit(f"REPL disconnect exited {rc}, expected 1")
              if "[bridge] disconnected: link lost" not in stderr.getvalue():
                  raise SystemExit(f"REPL disconnect was not reported cleanly: {stderr.getvalue()!r}")
              if not fake_session.closed:
                  raise SystemExit("session was not closed after REPL disconnect")
          finally:
              sys.argv = old_argv
              builtins.input = old_input
              bridge.preflight_image_path = old_image
              bridge.preflight_qemu = old_qemu
              bridge.LlmosSession = old_session
          PY

      - name: Check bridge AI preflight
        run: |
          python3 - <<'PY'
          import contextlib
          import io
          import os
          import sys

          import demo.bridge as bridge

          old_argv = sys.argv[:]
          old_session = bridge.LlmosSession
          old_key = os.environ.pop("ANTHROPIC_API_KEY", None)
          had_anthropic = "anthropic" in sys.modules
          old_anthropic = sys.modules.get("anthropic")

          class FakeAnthropic:
              @staticmethod
              def Anthropic():
                  raise SystemExit("Anthropic client should not be constructed without an API key")

          def fail_session(*args, **kwargs):
              raise SystemExit("LlmosSession should not be constructed before AI preflight")

          try:
              sys.modules["anthropic"] = FakeAnthropic
              bridge.LlmosSession = fail_session
              sys.argv = ["bridge.py", "--image", "/tmp/missing.img", "ai", "task"]
              stderr = io.StringIO()
              with contextlib.redirect_stderr(stderr):
                  try:
                      bridge.main()
                  except SystemExit as exc:
                      if exc.code != 2:
                          raise SystemExit(f"unexpected exit code: {exc.code}")
                  else:
                      raise SystemExit("AI mode without ANTHROPIC_API_KEY should exit")
              if "ANTHROPIC_API_KEY" not in stderr.getvalue():
                  raise SystemExit(f"unexpected stderr: {stderr.getvalue()!r}")
          finally:
              sys.argv = old_argv
              bridge.LlmosSession = old_session
              if old_key is not None:
                  os.environ["ANTHROPIC_API_KEY"] = old_key
              else:
                  os.environ.pop("ANTHROPIC_API_KEY", None)
              if had_anthropic:
                  sys.modules["anthropic"] = old_anthropic
              else:
                  sys.modules.pop("anthropic", None)
          PY

      - name: Check bridge AI key preflight before import
        run: |
          python3 - <<'PY'
          import builtins
          import contextlib
          import io
          import os

          import demo.bridge as bridge

          old_key = os.environ.pop("ANTHROPIC_API_KEY", None)
          old_import = builtins.__import__

          def fail_anthropic_import(name, *args, **kwargs):
              if name == "anthropic":
                  raise ImportError("synthetic missing anthropic")
              return old_import(name, *args, **kwargs)

          try:
              builtins.__import__ = fail_anthropic_import
              stderr = io.StringIO()
              with contextlib.redirect_stderr(stderr):
                  try:
                      bridge.make_anthropic_client()
                  except SystemExit as exc:
                      if exc.code != 2:
                          raise SystemExit(f"unexpected exit code: {exc.code}")
                  else:
                      raise SystemExit("missing ANTHROPIC_API_KEY should exit")
              err = stderr.getvalue()
              if "ANTHROPIC_API_KEY" not in err:
                  raise SystemExit(f"missing key did not win preflight: {err!r}")
              if "pip install anthropic" in err:
                  raise SystemExit(f"anthropic import ran before key preflight: {err!r}")
          finally:
              builtins.__import__ = old_import
              if old_key is not None:
                  os.environ["ANTHROPIC_API_KEY"] = old_key
              else:
                  os.environ.pop("ANTHROPIC_API_KEY", None)
          PY

      - name: Check bridge AI model selection
        run: |
          python3 - <<'PY'
          import contextlib
          import io
          import os

          import demo.bridge as bridge

          class FakeSession:
              banner = "# llmos test proto=1"

              def send(self, cmd):
                  raise SystemExit("send should not be called after DONE")

          class DoneTextBlock:
              type = "text"
              text = "DONE"

          class DoneResponse:
              content = [DoneTextBlock()]

          class RecordingMessages:
              def __init__(self):
                  self.models = []

              def create(self, **kwargs):
                  self.models.append(kwargs["model"])
                  return DoneResponse()

          class RecordingClient:
              def __init__(self):
                  self.messages = RecordingMessages()

          old_model = os.environ.pop("ANTHROPIC_MODEL", None)

          try:
              default_client = RecordingClient()
              out = io.StringIO()
              with contextlib.redirect_stdout(out):
                  rc = bridge.mode_ai(FakeSession(), "task", client=default_client)
              if rc != 0:
                  raise SystemExit(f"default model DONE exited {rc}, expected 0")
              if default_client.messages.models != [bridge.DEFAULT_ANTHROPIC_MODEL]:
                  raise SystemExit(f"default AI model was not used: {default_client.messages.models!r}")

              override_client = RecordingClient()
              os.environ["ANTHROPIC_MODEL"] = "claude-test-model"
              out = io.StringIO()
              with contextlib.redirect_stdout(out):
                  rc = bridge.mode_ai(FakeSession(), "task", client=override_client)
              if rc != 0:
                  raise SystemExit(f"override model DONE exited {rc}, expected 0")
              if override_client.messages.models != ["claude-test-model"]:
                  raise SystemExit(f"ANTHROPIC_MODEL override was not used: {override_client.messages.models!r}")
          finally:
              if old_model is not None:
                  os.environ["ANTHROPIC_MODEL"] = old_model
              else:
                  os.environ.pop("ANTHROPIC_MODEL", None)
          PY

