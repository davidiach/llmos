name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y nasm qemu-system-x86

      - name: Build
        run: make

      - name: Report sizes
        run: |
          echo "boot.bin:   $(wc -c < build/boot.bin) bytes"
          echo "kernel.bin: $(wc -c < build/kernel.bin) bytes"
          echo "llmos.img:  $(wc -c < build/llmos.img) bytes"

      - name: Smoke-test the protocol
        run: |
          set -o pipefail
          # Replay every shipped transcript against a fresh QEMU boot and
          # verify each one produces the markers that make it that beat.
          # The banner check is common to all; the rest is beat-specific.
          run_transcript() {
            local name="$1"
            local out="/tmp/${name}.txt"
            echo "::group::smoke: ${name}"
            timeout 30 python3 demo/bridge.py \
              --image build/llmos.img \
              script "demo/transcripts/${name}.llmos" \
              | tee "${out}"
            grep -q "^# # llmos v0.1 proto=1 primitives=" "${out}"
            echo "::endgroup::"
          }

          run_transcript 01_cold_discovery
          # Beat 1: introspection graph — help lists primitives, describe
          # reaches pci.scan, and pci.scan itself returns a populated bus walk.
          grep -q "^< ok primitives=help,describe" /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.scan " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=io.in .*allowlist=.*0x3f8.*0x3ff" /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read .*range may not cross offset ffff" /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read8 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read16 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read32 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read.seg " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read.seg8 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read.seg16 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=mem.read.seg32 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.config.read " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.config.read8 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.config.read16 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.config.read32 " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.cap.list " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.cap.read " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.bar.read " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.mem.read " /tmp/01_cold_discovery.txt
          grep -q "^< ok name=pci.mem.read32 " /tmp/01_cold_discovery.txt
          grep -q "^< ok devices=00\.00\.0:" /tmp/01_cold_discovery.txt

          run_transcript 02_hardware_archaeology
          # Beat 2: CPU + memory composition — prove cpu.vendor and mem.query
          # both round-tripped against real BIOS/CPUID data.
          grep -q "^< ok vendor=GenuineIntel " /tmp/02_hardware_archaeology.txt
          grep -q "^< ok conv_kb=" /tmp/02_hardware_archaeology.txt

          # CPUID leaf 1 encodes display model through base+extended fields.
          # Haswell is family 6, model 60; reporting model 12 means the
          # kernel ignored the extended model nibble.
          grep -q "^< ok ms=[0-9]\+" /tmp/02_hardware_archaeology.txt
          cat > /tmp/cpu_model_probe.llmos <<'EOF'
          cpu.vendor
          EOF
          echo "::group::smoke: cpuid-display-model"
          timeout 30 python3 demo/bridge.py \
            --image build/llmos.img \
            --qemu-arg=-cpu \
            --qemu-arg=Haswell \
            script /tmp/cpu_model_probe.llmos \
            | tee /tmp/cpu_model_probe.txt
          grep -q "^< ok vendor=GenuineIntel family=6 model=60 stepping=" /tmp/cpu_model_probe.txt
          echo "::endgroup::"

          run_transcript 03_denied_path
          # Beat 3: denial as an interface element — at least one io.in call
          # MUST hit the allowlist and come back with code=denied.
          grep -q '^< err code=denied detail="port not in allowlist"' /tmp/03_denied_path.txt
          grep -q "^< ok name=io.in .*allowlist=.*0x3f8.*0x3ff" /tmp/03_denied_path.txt
          grep -q "^< ok port=03fd value=[0-9a-f]\{2\}" /tmp/03_denied_path.txt
          ! grep -q "^< ok port=03fd value=03$" /tmp/03_denied_path.txt

          run_transcript 04_pci_walk
          # Beat 4: bus walk — schema first, then pci.scan enumerates a
          # populated bus instead of the protocol's empty-bus `ok devices=`.
          grep -q "^< ok name=pci.scan " /tmp/04_pci_walk.txt
          grep -q "^< ok devices=00\.00\.0:" /tmp/04_pci_walk.txt

          run_transcript 05_bar_windows
          # Beat 5: BAR decoding — schema first, then each lookup. The
          # assertions lock down the four interface elements pci.bars
          # adds: a prefetchable 32-bit memory BAR (stdvga BAR0), an I/O
          # BAR (PIIX3-IDE bus-master window at BAR4), an absent function
          # reported cleanly as `unavailable`, and a malformed BDF
          # rejected as `bad_arg` (so the usage string is discoverable
          # from a mistaken call too, not just from `describe`).
          grep -q "^< ok name=pci.bars " /tmp/05_bar_windows.txt
          grep -q "^< ok bdf=00\.02\.0 bars=0:m32:[0-9a-f]\{8\}:p" /tmp/05_bar_windows.txt
          grep -q "^< ok bdf=00\.01\.1 bars=.*:io:[0-9a-f]\{8\}" /tmp/05_bar_windows.txt
          grep -q '^< err code=unavailable detail="no such function"' /tmp/05_bar_windows.txt
          grep -q '^< err code=bad_arg detail="usage: pci.bars bdf=BB\.DD\.F"' /tmp/05_bar_windows.txt
          grep -A1 "^> pci\.bars bdf=00\.02\.0x" /tmp/05_bar_windows.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.bars bdf=BB\.DD\.F"'

          run_transcript 06_bar_reads
          # Beat 6: BAR-bound reads - schema first, then a successful
          # I/O-space BAR read. Memory BARs are denied, empty BARs are
          # unavailable, and the small bounded read window rejects len=17.
          grep -q "^< ok name=pci.bar.read " /tmp/06_bar_reads.txt
          grep -q "^< ok bdf=00\.01\.1 bar=4 kind=io port=[0-9a-f]\{4\} offset=0000 len=4 data=[0-9a-f]\{8\}" /tmp/06_bar_reads.txt
          grep -q "^< ok bdf=00\.01\.1 bar=4 kind=io port=[0-9a-f]\{4\} offset=0002 len=2 data=[0-9a-f]\{4\}" /tmp/06_bar_reads.txt
          grep -q '^< err code=denied detail="only I/O BAR reads are supported"' /tmp/06_bar_reads.txt
          grep -q '^< err code=unavailable detail="BAR not present"' /tmp/06_bar_reads.txt
          grep -q '^< err code=out_of_range detail="bar, offset, or len out of range"' /tmp/06_bar_reads.txt
          grep -A1 "^> pci\.bar\.read bdf=00\.02\.0x" /tmp/06_bar_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.bar.read bdf=BB\.DD\.F bar=N offset=HH len=N"'

          run_transcript 07_mem_reads
          # Beat 7: memory BAR reads - schema first, then successful
          # reads from std-vga memory BARs through the flat-FS MMIO path.
          # I/O BARs are denied, empty BARs are unavailable, and len=17
          # stays outside the bounded read window.
          grep -q "^< ok name=pci.mem.read " /tmp/07_mem_reads.txt
          grep -q "^< ok bdf=00\.02\.0 bar=0 kind=m32 addr=[0-9a-f]\{8\} offset=0000 len=4 data=[0-9a-f]\{8\}" /tmp/07_mem_reads.txt
          grep -q "^< ok bdf=00\.02\.0 bar=2 kind=m32 addr=[0-9a-f]\{8\} offset=0000 len=4 data=[0-9a-f]\{8\}" /tmp/07_mem_reads.txt
          grep -q '^< err code=denied detail="only memory BAR reads are supported"' /tmp/07_mem_reads.txt
          grep -q '^< err code=unavailable detail="BAR not present"' /tmp/07_mem_reads.txt
          grep -q '^< err code=out_of_range detail="bar, offset, or len out of range"' /tmp/07_mem_reads.txt
          grep -A1 "^> pci\.mem\.read bdf=00\.02\.0x" /tmp/07_mem_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.mem.read bdf=BB\.DD\.F bar=N offset=HH len=N"'

          run_transcript 08_typed_mem_reads
          # Beat 8: typed MMIO reads - schema first, then fixed-width
          # little-endian values from the std-vga MMIO register BAR.
          # I/O BARs are denied, empty BARs are unavailable, and bad
          # BAR slots still stay out of range.
          grep -q "^< ok name=pci.mem.read32 " /tmp/08_typed_mem_reads.txt
          grep -q "^< ok bdf=00\.02\.0 bar=2 kind=m32 addr=[0-9a-f]\{8\} offset=0000 width=8 value=[0-9a-f]\{2\}" /tmp/08_typed_mem_reads.txt
          grep -q "^< ok bdf=00\.02\.0 bar=2 kind=m32 addr=[0-9a-f]\{8\} offset=0000 width=16 value=[0-9a-f]\{4\}" /tmp/08_typed_mem_reads.txt
          grep -q "^< ok bdf=00\.02\.0 bar=2 kind=m32 addr=[0-9a-f]\{8\} offset=0000 width=32 value=[0-9a-f]\{8\}" /tmp/08_typed_mem_reads.txt
          grep -q '^< err code=denied detail="only memory BAR reads are supported"' /tmp/08_typed_mem_reads.txt
          grep -q '^< err code=unavailable detail="BAR not present"' /tmp/08_typed_mem_reads.txt
          grep -q '^< err code=out_of_range detail="bar, offset, or alignment out of range"' /tmp/08_typed_mem_reads.txt
          grep -A1 "^> pci\.mem\.read32 bdf=00\.02\.0 bar=2 offset=1" /tmp/08_typed_mem_reads.txt \
            | grep -q '^< err code=out_of_range detail="bar, offset, or alignment out of range"'
          grep -A1 "^> pci\.mem\.read8 bdf=00\.02\.0x" /tmp/08_typed_mem_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.mem.read8 bdf=BB\.DD\.F bar=N offset=HH"'
          grep -A1 "^> pci\.mem\.read16 bdf=00\.02\.0x" /tmp/08_typed_mem_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.mem.read16 bdf=BB\.DD\.F bar=N offset=HH"'
          grep -A1 "^> pci\.mem\.read32 bdf=00\.02\.0x" /tmp/08_typed_mem_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.mem.read32 bdf=BB\.DD\.F bar=N offset=HH"'

          run_transcript 09_config_reads
          # Beat 9: raw config-space reads - schema first, then bounded
          # byte reads over vendor/device, command/status, class, and a
          # cross-dword slice. Absent functions and overlong reads stay
          # structured.
          grep -q "^< ok name=pci.config.read " /tmp/09_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=00 len=4 data=34121111" /tmp/09_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=04 len=4 data=[0-9a-f]\{8\}" /tmp/09_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=08 len=4 data=[0-9a-f]\{8\}" /tmp/09_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=0e len=4 data=[0-9a-f]\{8\}" /tmp/09_config_reads.txt
          grep -q '^< err code=unavailable detail="no such function"' /tmp/09_config_reads.txt
          grep -q '^< err code=out_of_range detail="offset or len out of range"' /tmp/09_config_reads.txt
          grep -A1 "^> pci\.config\.read bdf=00\.02\.0x" /tmp/09_config_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.config.read bdf=BB\.DD\.F offset=HH len=N"'

          run_transcript 10_typed_config_reads
          # Beat 10: typed config-space reads - schema first, then decoded
          # little-endian values over vendor/device and class registers.
          # Absent functions and unaligned multi-byte reads stay structured.
          grep -q "^< ok name=pci.config.read8 " /tmp/10_typed_config_reads.txt
          grep -q "^< ok name=pci.config.read16 " /tmp/10_typed_config_reads.txt
          grep -q "^< ok name=pci.config.read32 " /tmp/10_typed_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=00 width=16 value=1234" /tmp/10_typed_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=02 width=16 value=1111" /tmp/10_typed_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=08 width=32 value=03000002" /tmp/10_typed_config_reads.txt
          grep -q "^< ok bdf=00\.02\.0 offset=0b width=8 value=03" /tmp/10_typed_config_reads.txt
          grep -q '^< err code=unavailable detail="no such function"' /tmp/10_typed_config_reads.txt
          grep -q '^< err code=out_of_range detail="offset or alignment out of range"' /tmp/10_typed_config_reads.txt
          grep -A1 "^> pci\.config\.read32 bdf=00\.02\.0x" /tmp/10_typed_config_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.config.read32 bdf=BB\.DD\.F offset=HH"'

          run_transcript 11_capability_list
          # Beat 11: PCI capability listing - schema first, then empty
          # conventional capability lists on the default QEMU devices and
          # normal PCI error handling.
          grep -q "^< ok name=pci.cap.list " /tmp/11_capability_list.txt
          grep -q "^< ok bdf=00\.03\.0 caps= truncated=0 malformed=0" /tmp/11_capability_list.txt
          grep -q "^< ok bdf=00\.02\.0 caps= truncated=0 malformed=0" /tmp/11_capability_list.txt
          grep -q '^< err code=unavailable detail="no such function"' /tmp/11_capability_list.txt
          grep -A1 "^> pci\.cap\.list bdf=00\.03\.0x" /tmp/11_capability_list.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.cap.list bdf=BB\.DD\.F"'

          run_transcript 12_capability_reads
          # Beat 12: capability-relative reads - schema first, then a
          # list-verified read that reports unavailable on default QEMU
          # devices with no conventional capability chain.
          grep -q "^< ok name=pci.cap.read " /tmp/12_capability_reads.txt
          grep -q "^< ok bdf=00\.03\.0 caps= truncated=0 malformed=0" /tmp/12_capability_reads.txt
          grep -q '^< err code=unavailable detail="capability not found"' /tmp/12_capability_reads.txt
          grep -q '^< err code=out_of_range detail="cap, offset, or len out of range"' /tmp/12_capability_reads.txt
          grep -q '^< err code=unavailable detail="no such function"' /tmp/12_capability_reads.txt
          grep -A1 "^> pci\.cap\.read bdf=00\.03\.0x" /tmp/12_capability_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.cap.read bdf=BB\.DD\.F cap=HH offset=HH len=N"'

          run_transcript 13_typed_memory_reads
          # Beat 13: typed low-memory reads - schema first, then raw boot
          # sector bytes decoded as 8/16/32-bit little-endian values.
          grep -q "^< ok name=mem.read8 " /tmp/13_typed_memory_reads.txt
          grep -q "^< ok name=mem.read16 " /tmp/13_typed_memory_reads.txt
          grep -q "^< ok name=mem.read32 " /tmp/13_typed_memory_reads.txt
          grep -q "^< ok addr=7c00 len=4 data=fa31c08e" /tmp/13_typed_memory_reads.txt
          grep -A1 "^> mem\.read addr=7c00 len=000004" /tmp/13_typed_memory_reads.txt \
            | grep -q "^< ok addr=7c00 len=4 data=fa31c08e"
          grep -q "^< ok addr=7c00 width=8 value=fa" /tmp/13_typed_memory_reads.txt
          grep -q "^< ok addr=7c00 width=16 value=31fa" /tmp/13_typed_memory_reads.txt
          grep -q "^< ok addr=7c00 width=32 value=8ec031fa" /tmp/13_typed_memory_reads.txt
          grep -q '^< err code=out_of_range detail="addr or alignment out of range"' /tmp/13_typed_memory_reads.txt
          grep -A1 "^> mem\.read32 addr=7c00x" /tmp/13_typed_memory_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read32 addr=HHHH"'
          grep -A1 "^> mem\.read addr=7c00 len=65792" /tmp/13_typed_memory_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read addr=HHHH len=N"'
          grep -A1 "^> mem\.read addr=fff0 len=17" /tmp/13_typed_memory_reads.txt \
            | grep -q '^< err code=out_of_range detail="addr or len out of range"'

          run_transcript 14_segment_memory_reads
          # Beat 14: explicit segment:offset memory reads - segment 0 agrees
          # with mem.read, BIOS ROM at f000:fff0 is readable, and crossing
          # offset ffff is rejected.
          grep -q "^< ok name=mem.read.seg " /tmp/14_segment_memory_reads.txt
          grep -q "^< ok addr=7c00 len=4 data=fa31c08e" /tmp/14_segment_memory_reads.txt
          grep -q "^< ok seg=0000 offset=7c00 len=4 data=fa31c08e" /tmp/14_segment_memory_reads.txt
          grep -q "^< ok seg=f000 offset=fff0 len=16 data=ea5be000f030362f32332f393900fc01" /tmp/14_segment_memory_reads.txt
          grep -q '^< err code=out_of_range detail="offset or len out of range"' /tmp/14_segment_memory_reads.txt
          grep -A1 "^> mem\.read\.seg seg=f000 offset=fff0x" /tmp/14_segment_memory_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read.seg seg=HHHH offset=HHHH len=N"'

          run_transcript 15_typed_segment_memory_reads
          # Beat 15: typed segment memory reads - schema first, then the
          # same BIOS reset-vector bytes decoded as little-endian values.
          grep -q "^< ok name=mem.read.seg8 " /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok name=mem.read.seg16 " /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok name=mem.read.seg32 " /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok seg=f000 offset=fff0 len=4 data=ea5be000" /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok seg=f000 offset=fff0 width=8 value=ea" /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok seg=f000 offset=fff0 width=16 value=5bea" /tmp/15_typed_segment_memory_reads.txt
          grep -q "^< ok seg=f000 offset=fff0 width=32 value=00e05bea" /tmp/15_typed_segment_memory_reads.txt
          grep -q '^< err code=out_of_range detail="offset or alignment out of range"' /tmp/15_typed_segment_memory_reads.txt
          grep -A1 "^> mem\.read\.seg32 seg=f000 offset=fff0x" /tmp/15_typed_segment_memory_reads.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read.seg32 seg=HHHH offset=HHHH"'

          run_transcript 16_line_length
          # Beat 16: request lines longer than the kernel input buffer must
          # fail as malformed instead of executing a truncated prefix.
          grep -q '^< err code=bad_arg detail="request line too long"' /tmp/16_line_length.txt

          run_transcript 17_no_arg_validation
          # Beat 17: args=none primitives must reject unexpected arguments.
          test "$(grep -c '^< err code=bad_arg detail="unexpected arguments"' /tmp/17_no_arg_validation.txt)" = "7"

          run_transcript 18_describe_arg_validation
          # Beat 18: describe rejects extra tokens without confusing them for
          # an unknown primitive name.
          grep -A1 "^> describe help x=1" /tmp/18_describe_arg_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: describe NAME"'
          grep -A1 "^> describe no\.such" /tmp/18_describe_arg_validation.txt \
            | grep -q '^< err code=unknown_cmd detail="no such primitive"'

          run_transcript 19_key_validation
          # Beat 19: KEY=VALUE primitives reject unknown and duplicate keys.
          grep -A1 "^> mem\.read addr=7c00 len=4 junk=1" /tmp/19_key_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read addr=HHHH len=N"'
          grep -A1 "^> mem\.read addr=7c00 len=4 len=4" /tmp/19_key_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: mem.read addr=HHHH len=N"'
          grep -A1 "^> io\.in port=3fd junk=1" /tmp/19_key_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: io.in port=HH"'
          grep -A1 "^> pci\.bars bdf=00\.02\.0 junk=1" /tmp/19_key_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.bars bdf=BB\.DD\.F"'

          run_transcript 20_bdf_width_validation
          # Beat 20: BDF inputs must match the fixed-width pci.scan shape.
          grep -A1 "^> pci\.bars bdf=0\.2\.0" /tmp/20_bdf_width_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.bars bdf=BB\.DD\.F"'
          grep -A1 "^> pci\.config\.read bdf=00\.2\.0 offset=0 len=4" /tmp/20_bdf_width_validation.txt \
            | grep -q '^< err code=bad_arg detail="usage: pci.config.read bdf=BB\.DD\.F offset=HH len=N"'
          grep -q "^< ok bdf=00\.03\.0 caps= truncated=0 malformed=0" /tmp/20_bdf_width_validation.txt

          run_transcript 21_script_exact_lines
          # Beat 21: script replay preserves request bytes instead of
          # canonicalizing whitespace before the kernel sees it.
          grep -A1 "^>  help" /tmp/21_script_exact_lines.txt \
            | grep -q '^< err code=unknown_cmd detail="try `help`"'
          grep -A1 "^> help unexpected=1" /tmp/21_script_exact_lines.txt \
            | grep -q '^< err code=bad_arg detail="unexpected arguments"'

          # Capability-chain regression: attach a virtio PCI function because
          # the default i440FX devices expose no conventional capability list.
          # This locks down a non-empty chain, then reads bytes relative to the
          # first listed capability without hard-coding that offset.
          cat > /tmp/pci_caps_probe.llmos <<'EOF'
          pci.scan
          pci.cap.list bdf=00.04.0
          pci.config.read bdf=00.04.0 offset=34 len=4
          EOF
          echo "::group::smoke: pci-cap-list"
          timeout 30 python3 demo/bridge.py \
            --image build/llmos.img \
            --qemu-arg=-device \
            --qemu-arg=virtio-net-pci,addr=4 \
            script /tmp/pci_caps_probe.llmos \
            | tee /tmp/pci_caps_probe.txt
          grep -q "^# # llmos v0.1 proto=1 primitives=" /tmp/pci_caps_probe.txt
          grep -q "^< ok devices=.*00\.04\.0:1af4:1000:02" /tmp/pci_caps_probe.txt
          grep -q "^< ok bdf=00\.04\.0 caps=[0-9a-f]\{2\}:[0-9a-f]\{2\}.* truncated=0 malformed=0" /tmp/pci_caps_probe.txt
          grep -q "^< ok bdf=00\.04\.0 offset=34 len=4 data=[0-9a-f]\{8\}" /tmp/pci_caps_probe.txt
          cap=$(sed -n 's/^< ok bdf=00\.04\.0 caps=\([0-9a-f][0-9a-f]\):.*/\1/p' /tmp/pci_caps_probe.txt)
          test -n "${cap}"
          cat > /tmp/pci_cap_read_probe.llmos <<EOF
          pci.cap.read bdf=00.04.0 cap=${cap} offset=0 len=4
          EOF
          timeout 30 python3 demo/bridge.py \
            --image build/llmos.img \
            --qemu-arg=-device \
            --qemu-arg=virtio-net-pci,addr=4 \
            script /tmp/pci_cap_read_probe.llmos \
            | tee /tmp/pci_cap_read_probe.txt
          grep -q "^< ok bdf=00\.04\.0 cap=${cap} id=[0-9a-f]\{2\} offset=00 len=4 data=[0-9a-f]\{8\}" /tmp/pci_cap_read_probe.txt
          echo "::endgroup::"

          # Bridge-following regression: boot QEMU with an explicit PCI bridge
          # plus an e1000 behind it. pci.scan must reach bus 01, pci.bars on
          # the bridge (header type 1) must cap at two slots, and pci.bars
          # on the e1000 behind the bridge must work identically to one on
          # bus 0. Use --qemu-arg=VALUE (not --qemu-arg VALUE) so argparse
          # doesn't misread dash-prefixed QEMU flags as bridge.py options.
          cat > /tmp/pci_bridge_probe.llmos <<'EOF'
          describe pci.scan
          pci.scan
          pci.bars bdf=00.04.0
          pci.config.read bdf=01.02.0 offset=0 len=4
          pci.config.read32 bdf=01.02.0 offset=0
          pci.bars bdf=01.02.0
          pci.mem.read bdf=01.02.0 bar=0 offset=0 len=4
          pci.mem.read32 bdf=01.02.0 bar=0 offset=0
          EOF
          echo "::group::smoke: pci-bridge-follow"
          timeout 30 python3 demo/bridge.py \
            --image build/llmos.img \
            --qemu-arg=-device \
            --qemu-arg=pci-bridge,bus=pci.0,chassis_nr=1,id=br0,addr=4 \
            --qemu-arg=-device \
            --qemu-arg=e1000,bus=br0,addr=2 \
            script /tmp/pci_bridge_probe.llmos \
            | tee /tmp/pci_bridge_probe.txt
          grep -q "^# # llmos v0.1 proto=1 primitives=" /tmp/pci_bridge_probe.txt
          grep -q "^< ok name=pci.scan " /tmp/pci_bridge_probe.txt
          grep -q "^< ok devices=.*00\.04\.0:1b36:0001:06.*01\.02\.0:8086:100e:02" /tmp/pci_bridge_probe.txt
          # Bridge (type 1) MUST list slot 0 and MUST NOT emit a slot 2+
          # (the handler caps type-1 headers at two BAR slots). QEMU's
          # pci-bridge wires BAR0 as a 64-bit MMIO window for the shpc
          # region, so this is also the only smoke coverage of the m64
          # decode path (high dword first, 16 hex digits of base).
          grep -q "^< ok bdf=00\.04\.0 bars=0:" /tmp/pci_bridge_probe.txt
          ! grep -q "^< ok bdf=00\.04\.0 bars=.*,2:" /tmp/pci_bridge_probe.txt
          grep -q "^< ok bdf=00\.04\.0 bars=0:m64:[0-9a-f]\{16\}:[pn]" /tmp/pci_bridge_probe.txt
          # e1000 on bus 01 MUST decode its 32-bit MMIO BAR - proves
          # pci.bars works on any bus, not just bus 0.
          grep -q "^< ok bdf=01\.02\.0 offset=00 len=4 data=86800e10" /tmp/pci_bridge_probe.txt
          grep -q "^< ok bdf=01\.02\.0 offset=00 width=32 value=100e8086" /tmp/pci_bridge_probe.txt
          grep -q "^< ok bdf=01\.02\.0 bars=0:m32:[0-9a-f]\{8\}:n" /tmp/pci_bridge_probe.txt
          # And pci.mem.read must be able to read that downstream MMIO BAR.
          grep -q "^< ok bdf=01\.02\.0 bar=0 kind=m32 addr=[0-9a-f]\{8\} offset=0000 len=4 data=[0-9a-f]\{8\}" /tmp/pci_bridge_probe.txt
          grep -q "^< ok bdf=01\.02\.0 bar=0 kind=m32 addr=[0-9a-f]\{8\} offset=0000 width=32 value=[0-9a-f]\{8\}" /tmp/pci_bridge_probe.txt
          echo "::endgroup::"

      - name: Check bridge boot-timeout cleanup
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          import time
          from pathlib import Path

          from demo.bridge import LlmosSession

          marker = f"llmos-boot-timeout-probe-{os.getpid()}"
          try:
              LlmosSession(
                  Path("build/llmos.img"),
                  qemu_args=["-S", "-name", marker],
                  boot_timeout=0.2,
              )
          except TimeoutError:
              pass
          else:
              raise SystemExit("expected boot banner timeout")

          time.sleep(0.2)
          probe = subprocess.run(
              ["pgrep", "-f", marker],
              stdout=subprocess.PIPE,
              text=True,
              check=False,
          )
          if probe.stdout.strip():
              raise SystemExit(f"qemu process leaked: {probe.stdout.strip()}")
          PY

      - name: Check bridge forced-close wait
        run: |
          python3 - <<'PY'
          import subprocess

          from demo.bridge import LlmosSession

          class FakeProc:
              def __init__(self, reap_after_kill):
                  self.terminated = False
                  self.killed = False
                  self.wait_calls = 0
                  self.reap_after_kill = reap_after_kill

              def poll(self):
                  return None

              def terminate(self):
                  self.terminated = True

              def kill(self):
                  self.killed = True

              def wait(self, timeout=None):
                  self.wait_calls += 1
                  if self.wait_calls == 1 or not self.reap_after_kill:
                      raise subprocess.TimeoutExpired("stubborn-qemu", timeout)
                  return -9

          def check(reap_after_kill):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(reap_after_kill)
              session.close()
              if not session.proc.terminated:
                  raise SystemExit("close did not try terminate")
              if not session.proc.killed:
                  raise SystemExit("close did not kill after terminate timeout")
              if session.proc.wait_calls != 2:
                  raise SystemExit(f"expected wait after kill, got {session.proc.wait_calls}")

          check(True)
          check(False)
          PY

      - name: Check bridge broken-pipe send
        run: |
          python3 - <<'PY'
          from demo.bridge import LlmosSession

          class FailingStdin:
              def __init__(self, fail_on):
                  self.fail_on = fail_on
                  self.writes = []

              def write(self, payload):
                  self.writes.append(payload)
                  if self.fail_on == "write":
                      raise BrokenPipeError("stdin is closed")

              def flush(self):
                  if self.fail_on == "flush":
                      raise BrokenPipeError("stdin is closed")

          class FakeProc:
              def __init__(self, fail_on):
                  self.stdin = FailingStdin(fail_on)

          def check(fail_on):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(fail_on)
              session._sync_lost = False
              session.log = []
              session._readline = lambda timeout=2.0: (_ for _ in ()).throw(
                  SystemExit("send tried to read after stdin failed")
              )

              try:
                  session.send("help")
              except EOFError as exc:
                  if "stdin closed" not in str(exc):
                      raise SystemExit(f"unexpected EOF detail: {exc}")
              else:
                  raise SystemExit("expected EOFError from broken stdin")

              if not session._sync_lost:
                  raise SystemExit("broken stdin did not desynchronize session")
              try:
                  session.send("help")
              except RuntimeError:
                  pass
              else:
                  raise SystemExit("desynchronized session accepted another send")

          check("write")
          check("flush")
          PY

      - name: Check bridge stdout pump failures
        run: |
          python3 - <<'PY'
          import queue

          from demo.bridge import LlmosSession

          class FailingStdout:
              def __init__(self, chunks):
                  self.chunks = list(chunks)

              def read(self, size):
                  if self.chunks:
                      return self.chunks.pop(0)
                  raise OSError("stdout pipe failed")

          class FakeProc:
              def __init__(self, chunks):
                  self.stdout = FailingStdout(chunks)

          def check(chunks):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc(chunks)
              session._stdout_queue = queue.Queue()
              session._pump_stdout()
              try:
                  session._readline(timeout=0.01)
              except EOFError as exc:
                  if "partial" not in str(exc):
                      raise SystemExit(f"unexpected EOF detail: {exc}")
              else:
                  raise SystemExit("expected EOFError after stdout pump failure")

          check([])
          check([b"o", b"k"])
          PY

      - name: Check bridge single-line sends
        run: |
          python3 - <<'PY'
          from demo.bridge import LlmosSession

          class RecordingStdin:
              def __init__(self):
                  self.writes = []
                  self.flushed = False

              def write(self, payload):
                  self.writes.append(payload)

              def flush(self):
                  self.flushed = True

          class FakeProc:
              def __init__(self):
                  self.stdin = RecordingStdin()

          def check(cmd):
              session = object.__new__(LlmosSession)
              session.proc = FakeProc()
              session._sync_lost = False
              session.log = []
              session._readline = lambda timeout=2.0: (_ for _ in ()).throw(
                  SystemExit("send tried to read after rejecting command")
              )

              try:
                  session.send(cmd)
              except ValueError as exc:
                  if "single line" not in str(exc):
                      raise SystemExit(f"unexpected ValueError detail: {exc}")
              else:
                  raise SystemExit("expected ValueError for multi-line command")

              if session.proc.stdin.writes:
                  raise SystemExit(f"multi-line command was written: {session.proc.stdin.writes!r}")
              if session.proc.stdin.flushed:
                  raise SystemExit("multi-line command flushed stdin")
              if session._sync_lost:
                  raise SystemExit("local validation failure desynchronized session")

          check("help\nmem.query")
          check("help\rmem.query")
          PY

