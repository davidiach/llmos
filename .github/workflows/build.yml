                      raise SystemExit("script mode with a missing file should exit")
              if "script file not found" not in stderr.getvalue():
                  raise SystemExit(f"unexpected stderr: {stderr.getvalue()!r}")
          finally:
              sys.argv = old_argv
              bridge.LlmosSession = old_session
          PY

